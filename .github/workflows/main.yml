name: Build and Release Multi-Platform

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output_name: transfert-app
            output_ext: ''
            artifact_name: transfert-app-linux
            appimage_name: Transfert_TCP-v1.0.0-x86_64.AppImage
          - os: windows-latest
            output_name: transfert-app.exe
            output_ext: .exe
            artifact_name: transfert-app-windows
          - os: macos-latest
            output_name: transfert-app
            output_ext: ''
            artifact_name: transfert-app-macos
            app_name: Transfert_TCP.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            xvfb \
            wget \
            file \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxcb1 \
            libxau6 \
            libxdmcp6

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python-tk xquartz

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install pillow

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller --onefile --windowed --name transfert-app transfert.py
          chmod +x build-appimage.sh 2>/dev/null || true
          if [ -f "build-appimage.sh" ]; then
            xvfb-run -a ./build-appimage.sh
          else
            mkdir -p AppDir/usr/bin
            cp dist/transfert-app AppDir/usr/bin/
            cat > AppDir/transfert-app.desktop << 'DESKTOP'
[Desktop Entry]
Name=Transfert TCP
Comment=Application de transfert de fichiers TCP
Exec=transfert-app
Icon=transfert-app
Terminal=false
Type=Application
Categories=Network;FileTransfer;
DESKTOP
            cat > AppDir/AppRun << 'APPRUN'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
exec "$HERE/usr/bin/transfert-app" "$@"
APPRUN
            chmod +x AppDir/AppRun
            wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ./appimagetool-x86_64.AppImage AppDir Transfert_TCP-v1.0.0-x86_64.AppImage
          fi

      - name: Build on Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name transfert-app.exe transfert.py

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name transfert-app transfert.py
          mkdir -p Transfert_TCP.app/Contents/{MacOS,Resources}
          cp dist/transfert-app Transfert_TCP.app/Contents/MacOS/
          cat > Transfert_TCP.app/Contents/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>transfert-app</string>
    <key>CFBundleName</key>
    <string>Transfert TCP</string>
    <key>CFBundleDisplayName</key>
    <string>Transfert TCP</string>
    <key>CFBundleVersion</key>
    <string>1.0.0</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
</dict>
</plist>
PLIST
          chmod +x Transfert_TCP.app/Contents/MacOS/transfert-app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.output_name }}
            Transfert_TCP*.AppImage
            Transfert_TCP*.app
            *.exe
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ matrix.output_name }}
            Transfert_TCP*.AppImage
            Transfert_TCP*.app
            *.exe
          generate_release_notes: true
          draft: false
          prerelease: false

  create-release:
    name: Create Combined Release
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive
        run: |
          mkdir -p release
          if [ -f "artifacts/transfert-app-linux/transfert-app" ]; then
            cp artifacts/transfert-app-linux/transfert-app release/transfert-app-linux
          fi
          if [ -f "artifacts/transfert-app-linux/Transfert_TCP-v1.0.0-x86_64.AppImage" ]; then
            cp artifacts/transfert-app-linux/Transfert_TCP-v1.0.0-x86_64.AppImage release/
          fi
          if [ -f "artifacts/transfert-app-windows/transfert-app.exe" ]; then
            cp artifacts/transfert-app-windows/transfert-app.exe release/transfert-app-windows.exe
          fi
          if [ -f "artifacts/transfert-app-macos/transfert-app" ]; then
            cp artifacts/transfert-app-macos/transfert-app release/transfert-app-macos
          fi
          if [ -d "artifacts/transfert-app-macos/Transfert_TCP.app" ]; then
            cp -r artifacts/transfert-app-macos/Transfert_TCP.app release/
          fi
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              md5sum "$file" > "$file.md5"
              sha256sum "$file" > "$file.sha256"
            fi
          done
          cd ..

      - name: Upload combined release
        uses: actions/upload-artifact@v4
        with:
          name: release-all-platforms
          path: release/

      - name: Upload to GitHub Release (combined)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
